<svg viewBox="0 0 860 220" width="860" height="220" xmlns="http://www.w3.org/2000/svg" font-family="'Fira Code','Courier New',monospace">
  <defs>
    <style>
      .bg2{fill:#020617;}
      .track{fill:#0C1445;rx:6;}
      .bar-lbl{fill:#DDD6FE;font-size:11px;font-weight:600;}
      .bar-pct{fill:#A78BFA;font-size:10px;font-weight:700;text-anchor:end;}
      .sec{fill:#A78BFA;font-size:10px;font-weight:700;letter-spacing:1px;}
      .title2{fill:#F5F3FF;font-size:13px;font-weight:700;text-anchor:middle;}

      @keyframes grow1{from{width:0}to{width:312px}}
      @keyframes grow2{from{width:0}to{width:330px}}
      @keyframes grow3{from{width:0}to{width:294px}}
      @keyframes grow4{from{width:0}to{width:348px}}
      @keyframes grow5{from{width:0}to{width:276px}}
      @keyframes grow6{from{width:0}to{width:330px}}
      @keyframes grow7{from{width:0}to{width:294px}}
      @keyframes grow8{from{width:0}to{width:366px}}

      .b1{animation:grow1 1.6s cubic-bezier(.4,0,.2,1) 0.1s both;}
      .b2{animation:grow2 1.6s cubic-bezier(.4,0,.2,1) 0.25s both;}
      .b3{animation:grow3 1.6s cubic-bezier(.4,0,.2,1) 0.4s both;}
      .b4{animation:grow4 1.6s cubic-bezier(.4,0,.2,1) 0.55s both;}
      .b5{animation:grow5 1.6s cubic-bezier(.4,0,.2,1) 0.7s both;}
      .b6{animation:grow6 1.6s cubic-bezier(.4,0,.2,1) 0.85s both;}
      .b7{animation:grow7 1.6s cubic-bezier(.4,0,.2,1) 1.0s both;}
      .b8{animation:grow8 1.6s cubic-bezier(.4,0,.2,1) 1.15s both;}
    </style>
  </defs>

  <rect width="860" height="220" rx="12" class="bg2"/>
  <rect x="0" y="0" width="860" height="36" rx="12" fill="#0C1445"/>
  <rect x="0" y="24" width="860" height="12" fill="#0C1445"/>
  <text x="430" y="23" class="title2">⬡  Skill Proficiency — AI/ML Stack</text>
  <circle cx="18" cy="18" r="5" fill="#FF5F57"/>
  <circle cx="34" cy="18" r="5" fill="#FEBC2E"/>
  <circle cx="50" cy="18" r="5" fill="#28C840"/>

  <!-- LEFT COLUMN -->
  <text x="30" y="60" class="sec">CORE AI / ML</text>

  <!-- Python -->
  <text x="30" y="78" class="bar-lbl">Python</text>
  <rect x="170" y="66" width="390" height="14" rx="6" fill="#0C1445"/>
  <rect x="170" y="66" height="14" rx="6" fill="url(#g1)" class="b1"/>
  <text x="568" y="78" class="bar-pct">80%</text>

  <!-- RAG Systems -->
  <text x="30" y="100" class="bar-lbl">RAG Pipelines</text>
  <rect x="170" y="88" width="390" height="14" rx="6" fill="#0C1445"/>
  <rect x="170" y="88" height="14" rx="6" fill="url(#g2)" class="b2"/>
  <text x="568" y="100" class="bar-pct">85%</text>

  <!-- Transformers -->
  <text x="30" y="122" class="bar-lbl">Transformers / NLP</text>
  <rect x="170" y="110" width="390" height="14" rx="6" fill="#0C1445"/>
  <rect x="170" y="110" height="14" rx="6" fill="url(#g3)" class="b3"/>
  <text x="568" y="122" class="bar-pct">75%</text>

  <!-- Vector Search -->
  <text x="30" y="144" class="bar-lbl">Vector Search (FAISS)</text>
  <rect x="170" y="132" width="390" height="14" rx="6" fill="#0C1445"/>
  <rect x="170" y="132" height="14" rx="6" fill="url(#g4)" class="b4"/>
  <text x="568" y="144" class="bar-pct">89%</text>

  <!-- RIGHT COLUMN -->
  <text x="610" y="60" class="sec">DEPLOYMENT</text>

  <!-- Flask -->
  <text x="610" y="78" class="bar-lbl">Flask / REST API</text>
  <rect x="762" y="66" width="72" height="14" rx="6" fill="#1E1058"/>
  <text x="830" y="78" class="bar-pct" style="fill:#8B7EC8">71%</text>

  <!-- Docker -->
  <text x="610" y="100" class="bar-lbl">Docker / MLOps</text>
  <rect x="762" y="88" width="72" height="14" rx="6" fill="#1E1058"/>
  <text x="830" y="100" class="bar-pct" style="fill:#8B7EC8">85%</text>

  <!-- HuggingFace -->
  <text x="610" y="122" class="bar-lbl">HuggingFace</text>
  <rect x="762" y="110" width="72" height="14" rx="6" fill="#1E1058"/>
  <text x="830" y="122" class="bar-pct" style="fill:#8B7EC8">75%</text>

  <!-- PyTorch -->
  <text x="610" y="144" class="bar-lbl">PyTorch</text>
  <rect x="762" y="132" width="72" height="14" rx="6" fill="#1E1058"/>
  <text x="830" y="144" class="bar-pct" style="fill:#8B7EC8">94%</text>

  <!-- bottom tagline -->
  <text x="430" y="185" font-size="10" fill="#4C0F8F" text-anchor="middle" font-family="'Fira Code',monospace">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
  <text x="430" y="203" font-size="10" fill="#8B7EC8" text-anchor="middle" font-family="'Fira Code',monospace">🎓 BCA 2nd Year  ·  4 Live Projects  ·  91.3% Model Accuracy  ·  60× Latency Reduction  ·  Azure AI Certified</text>

  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1E1058"/><stop offset="100%" stop-color="#A78BFA"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1E1058"/><stop offset="100%" stop-color="#C4B5FD"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1E1058"/><stop offset="100%" stop-color="#8B5CF6"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1E1058"/><stop offset="100%" stop-color="#DDD6FE"/></linearGradient>
  </defs>
</svg>
