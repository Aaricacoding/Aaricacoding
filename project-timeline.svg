<svg viewBox="0 0 860 320" width="860" height="320" xmlns="http://www.w3.org/2000/svg" font-family="'Fira Code','Courier New',monospace">
  <defs>
    <style>
      .bg{fill:#020617;}
      .title{fill:#F5F3FF;font-size:13px;font-weight:700;text-anchor:middle;}
      .sec{fill:#4C0F8F;font-size:9px;letter-spacing:2px;text-anchor:middle;}
      .line-track{stroke:#1E1058;stroke-width:2;fill:none;}
      .line-fill{stroke:#7C3AED;stroke-width:2;fill:none;stroke-dasharray:600;stroke-dashoffset:600;animation:drawLine 2.4s ease 0.3s forwards;}
      @keyframes drawLine{to{stroke-dashoffset:0;}}
      .node-outer{fill:#0C1445;stroke:#4C0F8F;stroke-width:1.5;}
      .node-inner{fill:#7C3AED;}
      .node-pulse{fill:none;stroke:#7C3AED;stroke-width:1;opacity:0;}
      .n1 .node-pulse{animation:np 2s ease-out 0.8s infinite;}
      .n2 .node-pulse{animation:np 2s ease-out 1.4s infinite;}
      .n3 .node-pulse{animation:np 2s ease-out 2.0s infinite;}
      .n4 .node-pulse{animation:np 2s ease-out 2.6s infinite;}
      @keyframes np{0%{r:10px;opacity:0.8;}100%{r:20px;opacity:0;}}
      .card{fill:#0C1445;stroke:#1E1058;stroke-width:1;rx:8;}
      .card-hot{fill:#1E1058;stroke:#7C3AED;stroke-width:1.5;rx:8;}
      .card-title{fill:#F5F3FF;font-size:10px;font-weight:700;}
      .card-sub{fill:#A78BFA;font-size:8.5px;}
      .card-tag{fill:#050b1a;stroke:#4C0F8F;stroke-width:1;}
      .card-tag-txt{fill:#7C3AED;font-size:8px;text-anchor:middle;}
      .stat{fill:#DDD6FE;font-size:18px;font-weight:700;text-anchor:middle;}
      .stat-lbl{fill:#4C0F8F;font-size:8px;letter-spacing:1px;text-anchor:middle;}
      .year{fill:#1E1058;font-size:9px;text-anchor:middle;}

      /* fade-in stagger per card */
      .c1{opacity:0;animation:fadeCard 0.5s ease 0.8s forwards;}
      .c2{opacity:0;animation:fadeCard 0.5s ease 1.3s forwards;}
      .c3{opacity:0;animation:fadeCard 0.5s ease 1.8s forwards;}
      .c4{opacity:0;animation:fadeCard 0.5s ease 2.3s forwards;}
      @keyframes fadeCard{to{opacity:1;}}

      /* connector vertical dash animation */
      .vline{stroke:#4C0F8F;stroke-width:1;stroke-dasharray:4 4;animation:dashV 1.2s linear infinite;}
      @keyframes dashV{to{stroke-dashoffset:-16;}}
    </style>
  </defs>

  <rect width="860" height="320" rx="12" class="bg" stroke="#0C1445" stroke-width="1"/>
  <text x="430" y="22" class="sec">// PROJECT TIMELINE</text>
  <text x="430" y="42" class="title">Engineering Journey — Aarica Raj</text>

  <!-- horizontal spine -->
  <line x1="60" y1="155" x2="800" y2="155" class="line-track"/>
  <line x1="60" y1="155" x2="800" y2="155" class="line-fill"/>

  <!-- ── NODE 1 ── RAG PDF Chatbot -->
  <g class="n1">
    <circle cx="150" cy="155" r="12" class="node-outer"/>
    <circle cx="150" cy="155" r="5" class="node-inner"/>
    <circle cx="150" cy="155" r="10" class="node-pulse"/>
    <text x="150" y="145" class="year">2024</text>
  </g>
  <line x1="150" y1="143" x2="150" y2="100" class="vline"/>
  <g class="c1">
    <rect x="74" y="56" width="152" height="78" rx="8" class="card-hot"/>
    <text x="88" y="74" class="card-title">🔍 RAG PDF Chatbot</text>
    <text x="88" y="88" class="card-sub">LangChain · FAISS · Groq</text>
    <text x="88" y="100" class="card-sub">~0.5s latency · Docker</text>
    <rect x="88" y="108" width="44" height="14" rx="6" class="card-tag"/>
    <text x="110" y="118" class="card-tag-txt">LIVE ↗</text>
    <rect x="138" y="108" width="36" height="14" rx="6" fill="#050b1a" stroke="#2D1472" stroke-width="1"/>
    <text x="156" y="118" class="card-tag-txt" style="fill:#4C0F8F;">HF</text>
  </g>

  <!-- ── NODE 2 ── Emotion Analyzer -->
  <g class="n2">
    <circle cx="330" cy="155" r="12" class="node-outer"/>
    <circle cx="330" cy="155" r="5" class="node-inner"/>
    <circle cx="330" cy="155" r="10" class="node-pulse"/>
    <text x="330" y="145" class="year">2024</text>
  </g>
  <line x1="330" y1="167" x2="330" y2="212" class="vline"/>
  <g class="c2">
    <rect x="254" y="212" width="152" height="78" rx="8" class="card-hot"/>
    <text x="268" y="230" class="card-title">🎭 Emotion Analyzer</text>
    <text x="268" y="244" class="card-sub">DistilRoBERTa fine-tuned</text>
    <text x="268" y="256" class="card-sub">7-class · 91.3% accuracy</text>
    <rect x="268" y="266" width="54" height="14" rx="6" class="card-tag"/>
    <text x="295" y="276" class="card-tag-txt">91.3% ACC</text>
  </g>

  <!-- ── NODE 3 ── BLIP Multimodal -->
  <g class="n3">
    <circle cx="530" cy="155" r="12" class="node-outer"/>
    <circle cx="530" cy="155" r="5" class="node-inner"/>
    <circle cx="530" cy="155" r="10" class="node-pulse"/>
    <text x="530" y="145" class="year">2025</text>
  </g>
  <line x1="530" y1="143" x2="530" y2="100" class="vline"/>
  <g class="c3">
    <rect x="454" y="56" width="152" height="78" rx="8" class="card-hot"/>
    <text x="468" y="74" class="card-title">🖼️ BLIP Captioner</text>
    <text x="468" y="88" class="card-sub">Vision Transformer + BERT</text>
    <text x="468" y="100" class="card-sub">247M params · Multimodal</text>
    <rect x="468" y="108" width="54" height="14" rx="6" class="card-tag"/>
    <text x="495" y="118" class="card-tag-txt">247M PARAMS</text>
  </g>

  <!-- ── NODE 4 ── MLOps Pipeline -->
  <g class="n4">
    <circle cx="720" cy="155" r="12" class="node-outer"/>
    <circle cx="720" cy="155" r="5" class="node-inner"/>
    <circle cx="720" cy="155" r="10" class="node-pulse"/>
    <text x="720" y="145" class="year">2025</text>
  </g>
  <line x1="720" y1="167" x2="720" y2="212" class="vline"/>
  <g class="c4">
    <rect x="644" y="212" width="152" height="78" rx="8" class="card-hot"/>
    <text x="658" y="230" class="card-title">🌸 Iris MLOps</text>
    <text x="658" y="244" class="card-sub">Flask · Docker · REST API</text>
    <text x="658" y="256" class="card-sub">Full ML lifecycle · Cloud</text>
    <rect x="658" y="266" width="44" height="14" rx="6" class="card-tag"/>
    <text x="680" y="276" class="card-tag-txt">PROD ↗</text>
  </g>
</svg>
